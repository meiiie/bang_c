name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    name: Verify package and container
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run contract tests
        run: |
          python -m unittest discover -s tests -v
          python -m compileall -q src
          neko --version
          neko --policy

      - name: Build Docker image
        run: docker build -t neko-core:ci .

      - name: Verify Docker CSV contract
        run: |
          mkdir -p /tmp/neko-data /tmp/neko-output
          cat > /tmp/neko-data/public_test.csv <<'CSV'
          qid,question,A,B,C,D
          sample_001,"Which option is Alpha?",Alpha,Beta,Gamma,Delta
          sample_002,"Which option is Delta?",Alpha,Beta,Gamma,Delta
          CSV
          docker run --rm \
            -v /tmp/neko-data:/data \
            -v /tmp/neko-output:/output \
            neko-core:ci --workflow quick-dry-run --limit 2
          test -f /tmp/neko-output/pred.csv
          grep -q "qid,answer" /tmp/neko-output/pred.csv

  python-artifacts:
    name: Build Python release artifacts
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neko-core-python-artifacts
          path: dist/*

      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  # The Docker Hub publish job was REMOVED (2026-06-16). It built the lightweight default `Dockerfile`
  # (python:3.11-slim, NO baked model) and pushed it to ${DOCKERHUB_USERNAME}/neko-core:<tag> + :latest
  # — which would CLOBBER the ≤5B contest image (Dockerfile.qwen-selfconsist.kaniko, ~16.84GB, baked
  # Qwen3-4B) that is built and pushed MANUALLY via Kaniko. CI must never overwrite the contest tags.
  # If a release image is ever wanted from CI, build the contest Dockerfile and push a distinct -ci tag.
