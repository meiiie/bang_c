name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    name: Verify package and container
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run contract tests
        run: |
          python -m unittest discover -s tests -v
          python -m compileall -q src
          neko-core --version
          neko-core --policy

      - name: Build Docker image
        run: docker build -t neko-core:ci .

      - name: Verify Docker CSV contract
        run: |
          mkdir -p /tmp/neko-data /tmp/neko-output
          cat > /tmp/neko-data/public_test.csv <<'CSV'
          qid,question,A,B,C,D
          sample_001,"Which option is Alpha?",Alpha,Beta,Gamma,Delta
          sample_002,"Which option is Delta?",Alpha,Beta,Gamma,Delta
          CSV
          docker run --rm \
            -v /tmp/neko-data:/data \
            -v /tmp/neko-output:/output \
            neko-core:ci --workflow quick-dry-run --limit 2
          test -f /tmp/neko-output/pred.csv
          grep -q "qid,answer" /tmp/neko-output/pred.csv

  python-artifacts:
    name: Build Python release artifacts
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neko-core-python-artifacts
          path: dist/*

      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*

  dockerhub:
    name: Publish Docker Hub image
    runs-on: ubuntu-latest
    needs: verify
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Report missing Docker Hub secrets
        if: env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == ''
        run: |
          echo "Skipping Docker Hub push because DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not configured."

      - name: Set up Docker Buildx
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/neko-core
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push Docker image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
